# AI Fundamentals 知识模块定义

modules:
  - id: "01"
    name: "硬件架构"
    icon: "⚡"
    description: "GPU/TPU内部架构、片内互联、PCIe拓扑、GPUDirect技术"
    priority: "P0"
    status: "pending"
    learning_path:
      - step: "理解 GPU 芯片架构"
        desc: "从 SM、Tensor Core 到 HBM 显存的内部结构"
      - step: "掌握片内互联技术"
        desc: "NVLink、NVSwitch 的拓扑与带宽分析"
      - step: "学习 GPUDirect 技术"
        desc: "RDMA、P2P、CUDA IPC 实现零拷贝传输"
    highlights:
      - "GPU 微架构演进：Ampere → Hopper → Blackwell"
      - "HBM3e 显存带宽与容量深度分析"
      - "NVLink 4.0 双向带宽 900GB/s"
      - "GPUDirect RDMA 实现原理与性能"

  - id: "02"
    name: "GPU编程"
    icon: "🔧"
    description: "CUDA基础、高性能Kernel编写、Triton框架、性能调优"
    priority: "P0"
    status: "pending"
    learning_path:
      - step: "掌握 CUDA 编程基础"
        desc: "线程模型、内存层次、流与事件"
      - step: "编写高性能 Kernel"
        desc: "共享内存优化、Warp 级原语、Tensor Core 利用"
      - step: "使用 Triton 框架"
        desc: "OpenAI Triton 编程模型与性能调优"
    highlights:
      - "CUDA 编程模型：线程层次与内存层次"
      - "Triton 编程：Python 级 GPU 编程"
      - "NCCL 集合通信原语解析"
      - "Kernel 性能分析与 Profiling 实战"

  - id: "03"
    name: "AI集群运维"
    icon: "🖧"
    description: "大规模集群构建、高速网络配置、InfiniBand、NCCL、GPU运维"
    priority: "P0"
    status: "pending"
    learning_path:
      - step: "构建 AI 训练集群"
        desc: "GPU 服务器选型、网络拓扑设计与部署"
      - step: "配置高速网络"
        desc: "InfiniBand/RoCE 网络调优与故障排查"
      - step: "掌握 NCCL 通信"
        desc: "NCCL 原理、拓扑检测与性能调优"
    highlights:
      - "InfiniBand 与 RoCE 网络对比与选型"
      - "NCCL 集合通信原理与 Topology 检测"
      - "GPU 故障诊断与热插拔运维"
      - "大规模集群监控与告警体系"

  - id: "04"
    name: "云原生AI平台"
    icon: "☁️"
    description: "Kubernetes、GPU虚拟化、弹性调度、HAMi/KAI资源管理"
    priority: "P1"
    status: "pending"
    learning_path:
      - step: "Kubernetes GPU 管理"
        desc: "设备插件、GPU 调度与多实例 GPU"
      - step: "GPU 虚拟化与共享"
        desc: "MIG、时间分片、HAMi vGPU 方案"
      - step: "弹性调度与资源管理"
        desc: "训练/推理任务调度、队列管理与优先级"
    highlights:
      - "Kubernetes GPU Device Plugin 工作原理"
      - "HAMi vGPU：GPU 显存与算力切分"
      - "Volcano 批调度器在 AI 场景的应用"
      - "KubeRay：Ray on K8s 部署实战"

  - id: "05"
    name: "模型训练与微调"
    icon: "🎯"
    description: "大模型全流程训练、SFT指令微调、LoRA/QLoRA、AI Ops"
    priority: "P0"
    status: "pending"
    learning_path:
      - step: "理解大模型训练流程"
        desc: "预训练、SFT、RLHF 三阶段训练范式"
      - step: "掌握参数高效微调"
        desc: "LoRA、QLoRA、Adapter 等轻量微调方法"
      - step: "分布式训练实战"
        desc: "3D 并行策略、ZeRO 优化与训练框架"
    highlights:
      - "LoRA / QLoRA 原理与实战"
      - "3D 并行：数据并行 + 流水线并行 + 张量并行"
      - "DeepSpeed ZeRO 优化器深度解析"
      - "Megatron-LM 训练框架架构"

  - id: "06"
    name: "LLM理论与基础"
    icon: "🧠"
    description: "模型量化、MoE稀疏架构、Embedding原理、Deep Research方法论"
    priority: "P0"
    status: "pending"
    learning_path:
      - step: "理解 Transformer 架构"
        desc: "注意力机制、位置编码与上下文窗口"
      - step: "掌握模型量化技术"
        desc: "PTQ、QAT、GPTQ、AWQ 量化方法"
      - step: "学习 MoE 稀疏架构"
        desc: "混合专家模型原理与 DeepSeek MoE"
    highlights:
      - "模型量化：INT8 / INT4 / FP8 全链路"
      - "MoE 架构：从 Switch Transformer 到 DeepSeek"
      - "Embedding 模型原理与选型"
      - "Deep Research：AI 驱动的研究方法论"

  - id: "07"
    name: "RAG与工具"
    icon: "🔍"
    description: "检索增强生成系统、知识图谱、GraphRAG、文档解析工具"
    priority: "P1"
    status: "pending"
    learning_path:
      - step: "构建 RAG 系统"
        desc: "文档解析、分块、向量化、检索与生成"
      - step: "知识图谱与 GraphRAG"
        desc: "Neo4j 图数据库与图谱增强检索"
      - step: "文档解析与处理"
        desc: "PDF/HTML/Office 文档解析与结构化提取"
    highlights:
      - "RAG 系统架构：从朴素到高级"
      - "GraphRAG：知识图谱增强检索生成"
      - "向量数据库选型：Milvus / Qdrant / Weaviate"
      - "文档解析：MinerU / Docling 实战"

  - id: "08"
    name: "智能体系统"
    icon: "🤖"
    description: "AI Agent设计模式、多智能体协作、MCP协议、长期记忆机制"
    priority: "P1"
    status: "pending"
    learning_path:
      - step: "理解 Agent 设计模式"
        desc: "ReAct、Plan-and-Execute、Reflection 模式"
      - step: "多智能体协作"
        desc: "Agent 间通信、任务分解与编排"
      - step: "MCP 协议与工具集成"
        desc: "Model Context Protocol 标准与生态"
    highlights:
      - "Agent 设计模式：ReAct / Reflexion / LATS"
      - "MCP 协议：AI 工具调用标准化"
      - "多智能体框架：CrewAI / AutoGen / LangGraph"
      - "长期记忆：向量存储与上下文管理"

  - id: "09"
    name: "推理系统"
    icon: "⚙️"
    description: "高性能LLM推理、vLLM源码解析、KV Cache压缩、DeepSeek推理"
    priority: "P0"
    status: "pending"
    learning_path:
      - step: "理解推理优化原理"
        desc: "KV Cache、连续批处理、Speculative Decoding"
      - step: "vLLM 框架深度解析"
        desc: "PagedAttention、调度器与分布式推理"
      - step: "KV Cache 优化技术"
        desc: "压缩、Prefix Caching、离线存储"
    highlights:
      - "vLLM PagedAttention 源码解析"
      - "KV Cache：从原理到压缩与卸载"
      - "Speculative Decoding 推测解码"
      - "DeepSeek 推理部署实战"

  - id: "10"
    name: "AI相关课程"
    icon: "🎓"
    description: "AI Infra入门课程、AI编程实战、多智能体系统训练营"
    priority: "P2"
    status: "pending"
    learning_path:
      - step: "AI Infra 入门"
        desc: "从零理解 AI 基础设施全栈"
      - step: "AI 编程实战"
        desc: "动手搭建训练和推理环境"
      - step: "多智能体系统训练营"
        desc: "从单 Agent 到多 Agent 协作"
    highlights:
      - "AI Infrastructure 入门课程"
      - "AI 编程实战：从环境搭建到模型部署"
      - "多智能体系统训练营"
      - "Trae AI 编程工具使用指南"

  - id: "11"
    name: "LLM编程"
    icon: "💻"
    description: "LangGraph框架、Java Spring AI集成、Harness Engineering"
    priority: "P1"
    status: "pending"
    learning_path:
      - step: "掌握 LangGraph 框架"
        desc: "状态图、节点与边的编程模型"
      - step: "Spring AI 集成"
        desc: "Java 生态的 AI 应用开发"
      - step: "Harness Engineering"
        desc: "LLM 评测框架与工程实践"
    highlights:
      - "LangGraph：构建有状态的 LLM 应用"
      - "Spring AI：Java 开发者的 AI 工具箱"
      - "Harness：LLM 评测与优化工程"
      - "AI Coding 工具对比与选型"

  - id: "12"
    name: "实用工具与杂项"
    icon: "🛠️"
    description: "Mac本地部署DeepSeek R1、Ollama配置、开源模型基准测试"
    priority: "P2"
    status: "pending"
    learning_path:
      - step: "本地模型部署"
        desc: "Ollama / llama.cpp 快速部署开源模型"
      - step: "模型基准测试"
        desc: "评测框架、指标体系与对比方法"
      - step: "实用工具集合"
        desc: "提升 AI 开发效率的工具与技巧"
    highlights:
      - "Mac 本地部署 DeepSeek R1 实战"
      - "Ollama 安装配置与模型管理"
      - "开源模型基准测试方法"
      - "AI 开发者效率工具推荐"
